spring.application.name=raccoon-cash-api

# Local defaults keep the current PostgreSQL connection working.
# Later you can override them with environment variables: DB_URL, DB_USERNAME and DB_PASSWORD.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/raccoon_cash_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:juliomendez2007}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080
